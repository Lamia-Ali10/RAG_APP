<!DOCTYPE html>
<html lang="en">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/static/api.css">   
</head>

<body>
    <div class="container">
        <div class="head">
            <h1>Have a health question? Get reliable medical information quickly.</h1>
        </div>
        <div class="align">
          <div class="suggestion">
            <button class="s1">what are symptoms of diabetes?</button>
            <button class="s2">can cancer be cured if detected early?</button>
            <button class="s3">What is Cardiovascular diseases?</button>
          </div>
          <div class="chatbox">
            <div class="message" id="message"></div>
            <div class="input">
            <input type="text" id="userInput" placeholder="Ask your question..." />
            <button id="sendBtn">Send</button>
            </div>
        </div>

     </div>
            
        
     
    </div>
   <script src="/static/api.js"></script>
</body>

</html>
